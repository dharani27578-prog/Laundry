<!-- ════ SIDEBAR OVERLAY ════ -->
<div id="sidebarOverlay"
     onclick="closeSidebar()"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:399;"></div>

<!-- ════ SIDEBAR ════ -->
<aside class="sidebar" id="adminSidebar">

    <!-- Logo + close btn -->
    <div class="sidebar-logo">
        <div style="display:flex;align-items:center;justify-content:space-between;">
            <div>
                <div class="brand">LAUNDRY<span>PRO</span></div>
                <div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;">Admin Panel</div>
            </div>
            <button id="sidebarCloseBtn" onclick="closeSidebar()"
                    style="display:none;background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;padding:5px;line-height:1;border-radius:7px;">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <!-- Nav links -->
    <nav class="sidebar-nav">
        <div class="sidebar-section">Main</div>

        <div class="nav-item">
            <a href="{{ url_for('admin_dashboard') }}"
               class="sidebar-link {% if active=='dashboard' %}active{% endif %}"
               onclick="closeSidebar()">
                <i class="fa-solid fa-gauge-high"></i> Dashboard
            </a>
        </div>

        <div class="nav-item">
            <a href="{{ url_for('admin_dashboard') }}"
               class="sidebar-link {% if active=='orders' %}active{% endif %}"
               onclick="closeSidebar()">
                <i class="fa-solid fa-basket-shopping"></i> Orders
                {% if pending_count is defined and pending_count > 0 %}
                <span style="margin-left:auto;background:var(--warn);color:#fff;font-size:10px;padding:1px 7px;border-radius:50px;font-weight:700;">{{ pending_count }}</span>
                {% endif %}
            </a>
        </div>

        <div class="sidebar-section">Management</div>

        <div class="nav-item">
            <a href="{{ url_for('admin_users') }}"
               class="sidebar-link {% if active=='users' %}active{% endif %}"
               onclick="closeSidebar()">
                <i class="fa-solid fa-users"></i> Users
            </a>
        </div>

        <div class="nav-item">
            <a href="{{ url_for('admin_expenses') }}"
               class="sidebar-link {% if active=='expenses' %}active{% endif %}"
               onclick="closeSidebar()">
                <i class="fa-solid fa-wallet"></i> Expenses
            </a>
        </div>

        <div class="nav-item">
            <a href="{{ url_for('admin_reports') }}"
               class="sidebar-link {% if active=='reports' %}active{% endif %}"
               onclick="closeSidebar()">
                <i class="fa-solid fa-chart-line"></i> Reports
            </a>
        </div>

        <div class="sidebar-section">Config</div>

        <div class="nav-item">
            <a href="{{ url_for('admin_settings') }}"
               class="sidebar-link {% if active=='settings' %}active{% endif %}"
               onclick="closeSidebar()">
                <i class="fa-solid fa-gear"></i> Settings
            </a>
        </div>
    </nav>

    <!-- Footer: avatar + logout -->
    <div class="sidebar-footer">
        <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.05);border-radius:11px;margin-bottom:8px;">
            <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#3d6fff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;">
                {{ session.full_name[0]|upper }}
            </div>
            <div style="min-width:0;">
                <div style="color:#fff;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ session.full_name }}</div>
                <div style="color:rgba(255,255,255,.4);font-size:10px;">Administrator</div>
            </div>
        </div>
        <!-- Logout — always visible, prominent red style -->
        <a href="{{ url_for('logout') }}"
           style="display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;background:rgba(255,80,60,.12);color:rgba(255,110,90,.9);font-size:13px;font-weight:600;transition:all .2s;text-decoration:none;"
           onmouseover="this.style.background='rgba(255,80,60,.22)'"
           onmouseout="this.style.background='rgba(255,80,60,.12)'">
            <i class="fa-solid fa-arrow-right-from-bracket" style="width:16px;text-align:center;"></i> Logout
        </a>
    </div>
</aside>

<script>
/* Show close button only on mobile */
(function() {
    function checkWidth() {
        var btn = document.getElementById('sidebarCloseBtn');
        if (btn) btn.style.display = window.innerWidth <= 768 ? 'block' : 'none';
    }
    checkWidth();
    window.addEventListener('resize', checkWidth);
})();
</script>
