<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>{% block title %}Laundry Pro{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
    /* ══════════ DESIGN TOKENS ══════════════════════════════ */
    :root {
        --ink:       #0d0f14;
        --paper:     #f6f4ef;
        --primary:   #1a56ff;
        --primary-d: #0038d1;
        --accent:    #00e5c3;
        --warn:      #ff6b35;
        --success:   #00c896;
        --card-bg:   #ffffff;
        --border:    #e2e0d8;
        --muted:     #6b6f7a;
        --sidebar-w: 240px;
        --nav-h:     64px;
        --radius:    14px;
        --shadow:    0 4px 24px rgba(0,0,0,0.08);
        --shadow-lg: 0 12px 48px rgba(0,0,0,0.14);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--paper); color:var(--ink); font-size:15px; line-height:1.6; letter-spacing:-.01em; }
    h1,h2,h3,h4,h5,h6 { font-family:'Outfit',sans-serif; }
    a { color:var(--primary); text-decoration:none; }

    /* ══════════ FLASH MESSAGES ══════════════════════════ */
    .flash-container { position:fixed; top:70px; right:12px; z-index:9999; width:min(340px,calc(100vw - 24px)); }
    .flash-msg { padding:12px 16px; border-radius:var(--radius); margin-bottom:8px; font-weight:500; box-shadow:var(--shadow); animation:slideInRight .3s ease; display:flex; align-items:center; gap:10px; font-size:14px; }
    .flash-success { background:#e8faf4; border-left:4px solid var(--success); color:#007a55; }
    .flash-danger  { background:#fff0eb; border-left:4px solid var(--warn);    color:#c0410d; }
    .flash-warning { background:#fffae8; border-left:4px solid #f5a623;         color:#8a6300; }
    .flash-info    { background:#eaf0ff; border-left:4px solid var(--primary);  color:#0038d1; }
    @keyframes slideInRight { from{transform:translateX(60px);opacity:0;} to{transform:translateX(0);opacity:1;} }
    @keyframes fadeInDown   { from{opacity:0;transform:translateY(-8px);} to{opacity:1;transform:translateY(0);} }

    /* ══════════ BUTTONS ═════════════════════════════════ */
    .btn-primary-custom { background:var(--primary); color:#fff; padding:10px 22px; border-radius:50px; border:none; font-family:'Outfit',sans-serif; font-weight:600; font-size:13px; letter-spacing:.02em; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:7px; -webkit-tap-highlight-color:transparent; }
    .btn-primary-custom:hover { background:var(--primary-d); transform:translateY(-2px); box-shadow:0 6px 20px rgba(26,86,255,.35); color:#fff; }
    .btn-accent-custom { background:var(--accent); color:var(--ink); padding:10px 22px; border-radius:50px; border:none; font-family:'Outfit',sans-serif; font-weight:700; font-size:13px; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:7px; }
    .btn-accent-custom:hover { transform:translateY(-2px); filter:brightness(1.05); }

    /* ══════════ CARDS ═══════════════════════════════════ */
    .lp-card { background:var(--card-bg); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); overflow:hidden; }
    .lp-card-header { padding:16px 20px; border-bottom:1px solid var(--border); font-family:'Outfit',sans-serif; font-weight:700; font-size:16px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }

    /* ══════════ STATUS PILLS ════════════════════════════ */
    .status-pill { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:50px; font-size:11px; font-weight:600; letter-spacing:.03em; white-space:nowrap; }
    .status-Pending    { background:#fff3e8; color:#c06000; }
    .status-Accepted   { background:#e8f0ff; color:#0038d1; }
    .status-Processing { background:#f0eaff; color:#6200ea; }
    .status-Ready      { background:#e8faf4; color:#007a55; }
    .status-Delivered  { background:#e8faf4; color:#007a55; }
    .status-Cancelled  { background:#fff0eb; color:#c0410d; }

    /* ══════════ TABLES ══════════════════════════════════ */
    .lp-table { width:100%; border-collapse:separate; border-spacing:0; }
    .lp-table th { background:var(--ink); color:#fff; padding:11px 14px; font-family:'Outfit',sans-serif; font-size:11px; letter-spacing:.08em; text-transform:uppercase; white-space:nowrap; }
    .lp-table th:first-child { border-radius:10px 0 0 0; }
    .lp-table th:last-child  { border-radius:0 10px 0 0; }
    .lp-table td { padding:12px 14px; border-bottom:1px solid var(--border); vertical-align:middle; font-size:13px; }
    .lp-table tr:last-child td { border-bottom:none; }
    .lp-table tbody tr { transition:background .15s; }
    .lp-table tbody tr:hover { background:#f8f7ff; }

    /* ══════════ ADMIN LAYOUT ════════════════════════════ */
    .admin-layout { display:flex; min-height:100vh; }

    /* Sidebar */
    .sidebar {
        width: var(--sidebar-w);
        background: var(--ink);
        position: fixed; top:0; left:0; height:100vh;
        display: flex; flex-direction:column;
        z-index: 400;
        overflow-y: auto;
        transition: transform .3s cubic-bezier(.4,0,.2,1);
    }
    .sidebar-logo { padding:20px 18px; border-bottom:1px solid rgba(255,255,255,.08); }
    .sidebar-logo .brand { font-family:'Outfit',sans-serif; font-size:19px; font-weight:800; color:#fff; letter-spacing:-.02em; }
    .sidebar-logo .brand span { color:var(--accent); }
    .sidebar-nav { padding:14px 10px; flex:1; }
    .sidebar-nav .nav-item { margin-bottom:2px; }
    .sidebar-link { display:flex; align-items:center; gap:11px; padding:10px 13px; border-radius:10px; color:rgba(255,255,255,.6); font-weight:500; font-size:13px; transition:all .2s; -webkit-tap-highlight-color:transparent; }
    .sidebar-link:hover,.sidebar-link.active { background:rgba(255,255,255,.1); color:#fff; }
    .sidebar-link.active { background:var(--primary); color:#fff; }
    .sidebar-link i { width:16px; text-align:center; font-size:14px; }
    .sidebar-section { padding:10px 18px 3px; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.3); font-weight:600; }
    .sidebar-footer { padding:14px 10px; border-top:1px solid rgba(255,255,255,.08); }

    /* Admin content */
    .admin-content { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-width:0; }
    .topbar { height:var(--nav-h); background:#fff; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 20px; position:sticky; top:0; z-index:100; gap:12px; }
    .topbar-title { font-family:'Outfit',sans-serif; font-size:17px; font-weight:700; }
    .main-content { padding:20px; flex:1; }

    /* Hamburger toggle — hidden on desktop */
    .menu-toggle { display:none; background:none; border:none; cursor:pointer; padding:8px; color:var(--ink); font-size:20px; -webkit-tap-highlight-color:transparent; }

    /* ══════════ STAT CARDS ══════════════════════════════ */
    .stat-card { background:var(--card-bg); border-radius:var(--radius); border:1px solid var(--border); padding:18px; box-shadow:var(--shadow); position:relative; overflow:hidden; transition:transform .2s,box-shadow .2s; }
    .stat-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-lg); }
    .stat-card .stat-icon { width:44px; height:44px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:12px; }
    .stat-card .stat-value { font-family:'Outfit',sans-serif; font-size:26px; font-weight:800; }
    .stat-card .stat-label { font-size:12px; color:var(--muted); margin-top:2px; }

    /* ══════════ FORM ════════════════════════════════════ */
    .lp-input { width:100%; padding:9px 13px; border-radius:10px; border:1.5px solid var(--border); font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; background:#fff; color:var(--ink); transition:border .2s,box-shadow .2s; }
    .lp-input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(26,86,255,.12); }
    .lp-label { font-size:12px; font-weight:500; color:var(--muted); margin-bottom:4px; display:block; }

    /* ══════════ NOTIFICATION ════════════════════════════ */
    .notif-bell { position:relative; cursor:pointer; }
    .notif-badge { position:absolute; top:-5px; right:-5px; background:var(--warn); color:#fff; width:17px; height:17px; border-radius:50%; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; }
    .notif-dropdown { position:absolute; right:0; top:calc(100% + 10px); background:#fff; border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow-lg); width:min(320px,calc(100vw - 24px)); z-index:500; overflow:hidden; display:none; }
    .notif-dropdown.show { display:block; animation:fadeInDown .2s ease; }
    .notif-item { padding:11px 14px; border-bottom:1px solid var(--border); font-size:12px; line-height:1.5; display:flex; gap:9px; align-items:flex-start; transition:background .15s; }
    .notif-item:last-child { border-bottom:none; }
    .notif-item.unread { background:#f0f4ff; }
    .notif-item:hover { background:#f5f8ff; }
    .notif-dot { width:7px; height:7px; border-radius:50%; background:var(--primary); flex-shrink:0; margin-top:5px; }

    /* ══════════ MODAL ═══════════════════════════════════ */
    .lp-modal .modal-content { border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow-lg); }
    .lp-modal .modal-header { border-bottom:1px solid var(--border); padding:18px 22px; font-family:'Outfit',sans-serif; }
    .lp-modal .modal-body { padding:20px 22px; }
    .lp-modal .modal-footer { border-top:1px solid var(--border); padding:14px 22px; }

    /* ══════════ UTILITY ═════════════════════════════════ */
    .fw-syne { font-family:'Outfit',sans-serif; }
    .overflow-x-auto { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .btn-text-hide-mobile { }

    /* ══════════ MOBILE RESPONSIVE ══════════════════════ */
    @media(max-width:768px) {
        /* Admin sidebar — slide off left edge */
        .sidebar { transform:translateX(-100%); }
        .sidebar.open { transform:translateX(0); box-shadow:8px 0 32px rgba(0,0,0,.4); }

        /* Admin content — full width */
        .admin-content { margin-left:0 !important; }

        /* Show hamburger */
        .menu-toggle { display:flex; align-items:center; justify-content:center; }

        /* Content padding */
        .main-content { padding:14px; }
        .topbar { padding:0 14px; }
        .topbar-title { font-size:15px; }

        /* Flash */
        .flash-container { top:10px; right:10px; left:10px; width:auto; }

        /* Modals */
        .lp-modal .modal-dialog { margin:10px; }

        /* Hide text only in specific buttons */
        .btn-text-hide-mobile { display:none; }

        /* iOS zoom prevention */
        .lp-input { font-size:16px; }

        /* Stat card */
        .stat-card .stat-value { font-size:20px; }
        .stat-card { padding:14px; }
        .stat-card .stat-icon { width:38px; height:38px; font-size:16px; }
        .lp-card-header { padding:14px 16px; font-size:14px; }
    }
    @media(max-width:480px) {
        body { font-size:14px; }
    }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

<div class="flash-container">
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
    <div class="flash-msg flash-{{ cat }}">
        <i class="fa-solid {% if cat=='success' %}fa-circle-check{% elif cat=='danger' %}fa-circle-xmark{% elif cat=='warning' %}fa-triangle-exclamation{% else %}fa-circle-info{% endif %}"></i>
        {{ msg }}
    </div>
  {% endfor %}
{% endwith %}
</div>

{% block body %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ── FLASH AUTO-DISMISS ── */
setTimeout(() => {
    document.querySelectorAll('.flash-msg').forEach(el => {
        el.style.opacity='0'; el.style.transition='opacity .5s';
        setTimeout(() => el.remove(), 500);
    });
}, 4000);

/* ── NOTIFICATION DROPDOWN ── */
function toggleNotif(id) {
    const d = document.getElementById(id);
    if (d) d.classList.toggle('show');
}
document.addEventListener('click', e => {
    if (!e.target.closest('.notif-bell'))
        document.querySelectorAll('.notif-dropdown').forEach(d => d.classList.remove('show'));
});

/* ── ADMIN SIDEBAR (mobile) ── */
function openSidebar() {
    var sb = document.getElementById('adminSidebar');
    var ov = document.getElementById('sidebarOverlay');
    if (sb) sb.classList.add('open');
    if (ov) ov.style.display = 'block';
    document.body.style.overflow = 'hidden';
}
function closeSidebar() {
    var sb = document.getElementById('adminSidebar');
    var ov = document.getElementById('sidebarOverlay');
    if (sb) sb.classList.remove('open');
    if (ov) ov.style.display = 'none';
    document.body.style.overflow = '';
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
